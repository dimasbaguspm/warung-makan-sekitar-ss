<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warung Makan Sekitar SS — Radius 250m</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      line-height: 1.6;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    header {
      text-align: center;
      padding: 3rem 2rem;
      border-bottom: 1px solid #2a2a4a;
      margin-bottom: 2rem;
    }
    header h1 { font-size: 2.2rem; color: #00d4ff; margin-bottom: 0.5rem; }
    header .tagline { color: #888; font-size: 1.1rem; }
    header .meta {
      margin-top: 1rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    header .meta span {
      background: #1a1a3a;
      border: 1px solid #2a2a4a;
      color: #aaa;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.85rem;
    }
    header .meta span strong { color: #00d4ff; }

    .summary-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .summary-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 1.2rem;
      text-align: center;
    }
    .summary-card .num { font-size: 2rem; font-weight: 700; color: #00d4ff; }
    .summary-card .label { color: #888; font-size: 0.85rem; margin-top: 0.3rem; }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      overflow-x: auto;
    }
    .card h2 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #00d4ff;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #2a2a4a;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    thead tr {
      background: #0f0f1a;
      border-bottom: 2px solid #2a2a4a;
    }
    th {
      text-align: left;
      padding: 0.7rem 1rem;
      color: #888;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    td {
      padding: 0.7rem 1rem;
      border-bottom: 1px solid #ffffff08;
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #ffffff05; }

    td .name { font-weight: 600; color: #fff; }
    td .type-badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    td .type-badge.restaurant { background: #00d4ff20; color: #00d4ff; }
    td .type-badge.cafe { background: #00ff8820; color: #00ff88; }
    td .distance { color: #ffaa00; font-weight: 700; }
    td .coords, td .coords a { color: #aaa; font-size: 0.8rem; text-decoration: none; }
    td .cuisine { color: #aaa; font-size: 0.85rem; }
    td .hours { color: #888; font-size: 0.8rem; }
    td .notes { color: #666; font-size: 0.8rem; font-style: italic; }

    .source {
      text-align: center;
      color: #555;
      font-size: 0.8rem;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid #2a2a4a;
    }

    @media (max-width: 768px) {
      table { font-size: 0.8rem; }
      th, td { padding: 0.5rem 0.6rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 id="project-name">Loading...</h1>
      <p class="tagline" id="tagline"></p>
      <div class="meta">
        <span id="location-meta"></span>
        <span id="radius-meta"></span>
        <span id="total-meta"></span>
      </div>
    </header>

    <div class="summary-row" id="summary-row"></div>

    <div class="card">
      <h2>Daftar Warung & Cafe (Radius 250m)</h2>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Type</th>
            <th>Distance</th>
            <th>Coordinates</th>
            <th>Cuisine</th>
            <th>Hours</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="warungs-tbody"></tbody>
      </table>
    </div>

    <div class="card">
      <h2>Summary</h2>
      <p id="summary-text" style="color:#888;"></p>
    </div>

    <p class="source">Data source: <span id="source-text"></span></p>
  </div>

  <script>
    fetch('data.json')
      .then(r => r.json())
      .then(data => {
        document.getElementById('project-name').textContent = data.project;
        document.getElementById('tagline').textContent = data.tagline;
        document.getElementById('location-meta').innerHTML = '<strong>' + data.location.split('—')[0].trim() + '</strong>';
        document.getElementById('radius-meta').textContent = 'Radius: ' + data.radius_meters + 'm';
        document.getElementById('total-meta').textContent = data.summary.total + ' places';

        // Summary cards
        const sr = document.getElementById('summary-row');
        sr.innerHTML = `
          <div class="summary-card">
            <div class="num">${data.summary.total}</div>
            <div class="label">Total Places</div>
          </div>
          <div class="summary-card">
            <div class="num">${data.summary.restaurants}</div>
            <div class="label">Restaurants</div>
          </div>
          <div class="summary-card">
            <div class="num">${data.summary.cafes}</div>
            <div class="label">Cafes</div>
          </div>
          <div class="summary-card">
            <div class="num">${data.summary.closest}</div>
            <div class="label">Closest</div>
          </div>
          <div class="summary-card">
            <div class="num">${data.summary.furthest}</div>
            <div class="label">Furthest</div>
          </div>
        `;

        // Table rows
        const tbody = document.getElementById('warungs-tbody');
        data.warungs.forEach(w => {
          const typeClass = w.type === 'cafe' ? 'cafe' : 'restaurant';
          tbody.innerHTML += `
            <tr>
              <td>${w.id}</td>
              <td><span class="name">${w.name}</span></td>
              <td><span class="type-badge ${typeClass}">${w.type}</span></td>
              <td><span class="distance">~${w.distance_m}m</span></td>
              <td><a class="coords" href="https://www.google.com/maps?q=${w.lat},${w.lon}" target="_blank" rel="noopener">${w.lat}, ${w.lon}</a></td>
              <td><span class="cuisine">${w.cuisine}</span></td>
              <td><span class="hours">${w.hours}</span></td>
              <td><span class="notes">${w.notes}</span></td>
            </tr>
          `;
        });

        document.getElementById('summary-text').textContent =
          `${data.summary.restaurants} restaurants and ${data.summary.cafes} cafes within ${data.radius_meters}m from SoftwareSeni office. Closest: ${data.summary.closest}. Furthest: ${data.summary.furthest}.`;
        document.getElementById('source-text').textContent = data.sources.join(', ');
      })
      .catch(e => {
        document.body.innerHTML = '<p style="color:red;text-align:center;padding:2rem;">Failed to load data.json: ' + e.message + '</p>';
      });
  </script>
</body>
</html>
